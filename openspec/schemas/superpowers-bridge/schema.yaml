name: superpowers-bridge
version: 1
description: >
  Spec-driven workflow integrated with Superpowers skills.
  Requirements: Superpowers skills available (installed via plugin, .qwen/skills/,
  .claude/skills/, or any other method), providing skills:
  writing-plans, using-git-worktrees,
  subagent-driven-development, finishing-a-development-branch.
  Also requires the prd skill for the first artifact.
  Requires a subagent-capable platform (Claude Code, Codex, etc.) —
  this schema does not support runtimes without subagent support,
  because the alternative executor (executing-plans) loses TDD and
  code-review transitive activation, defeating Superpowers' value.
  If your platform lacks subagent support, use spec-driven instead.
  Each artifact / apply step verifies its required skills before
  invoking and surfaces a clear error if any are missing.
  prd → proposal → specs → tasks → plan → verify → retrospective.
  design is required (reorganizes prd output into structured
  Context / Goals / Decisions / Risks / Migration; referenced by tasks
  and plan for implementation guidance).
  Apply phase uses git worktrees + subagent-driven-development
  (brings TDD and code-review transitively).

artifacts:
  - id: prd
    generates: prd.md
    description: Product Requirements Document generated via prd skill
    template: prd.md
    instruction: |
      PRECHECK — required skill availability:
      Before invoking, confirm `prd` appears in your available
      skills list. If missing, STOP and inform the user that the
      prd skill must be installed (or that they can explicitly opt
      to write prd.md manually using the template below).
      Do NOT silently fall back.

      Use the Skill tool to invoke **prd**.

      IMPORTANT output redirection:
      - Do NOT write to `tasks/prd-[feature-name].md`. Instead,
        write the PRD output directly to this change's `prd.md`.
      - prd.md captures the PRD skill's full output — structured
        product requirements including goals, user stories, functional
        requirements, non-goals, and success metrics.
      - Do NOT pre-fill design.md during this step. design.md is a
        separate artifact that reorganizes prd.md content into
        technical design sections (Context, Goals, Decisions, Risks,
        Migration). That transformation happens in the design step.

      The prd skill will:
      1. Receive a feature description from the user
      2. Ask 3-5 clarifying questions (with lettered options)
      3. Generate a structured PRD based on answers
      4. Output the validated PRD
    requires: []

  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document based on the PRD output.

      Read prd.md for the validated product requirements. Extract:
      - **Why**: The motivation (from PRD goals and introduction)
      - **What Changes**: Specific changes derived from functional requirements
      - **Capabilities**: Identify which specs will be created or modified:
        - **New Capabilities**: List capabilities being introduced. Each becomes a new `specs/<name>/spec.md`. Use kebab-case names.
        - **Modified Capabilities**: List existing capabilities whose REQUIREMENTS are changing. Check `openspec/specs/` for existing spec names.
      - **Impact**: Affected code, APIs, dependencies, or systems.

      Since the PRD already explored the problem space,
      this should be a concise extraction, not a new exploration.

      IMPORTANT: The Capabilities section is critical. It creates the contract between
      proposal and specs phases. Each capability listed here will need a spec file.

      Keep it concise (1-2 pages). Focus on the "why" not the "how".
    requires:
      - prd

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document explaining HOW to implement the change.

      Read prd.md as input. prd.md contains the PRD skill's structured
      output (goals, user stories, functional requirements, non-goals,
      success metrics). Your job is to REORGANIZE that product-oriented
      content into technical design sections below.

      This is a transformation, not a copy. Extract and restructure:
      - Goals / Non-Goals (from PRD) → design.md §Goals / Non-Goals
      - Background/context (from PRD introduction) → design.md §Context
      - Technical decisions (derived from PRD requirements) → design.md §Decisions
      - Risks (from PRD considerations + inferred trade-offs) → design.md §Risks / Trade-offs
      - Add Migration Plan (may require inference from prd.md content)

      Sections:
      - **Context**: Background, current state, constraints, stakeholders
      - **Goals / Non-Goals**: What this design achieves and explicitly excludes
      - **Decisions**: Key technical choices with rationale (why X over Y?). Include alternatives considered per decision.
      - **Risks / Trade-offs**: Known limitations, things that could go wrong. Format: [Risk] → Mitigation
      - **Migration Plan**: Steps to deploy, rollback strategy (if applicable)
      - **Open Questions**: Outstanding decisions or unknowns to resolve

      Focus on architecture and approach, not line-by-line implementation.
      Good design docs explain the "why" behind technical decisions.
    requires:
      - prd

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.
      - New capabilities: use the exact kebab-case name from the proposal (specs/<capability>/spec.md).
      - Modified capabilities: use the existing spec folder name from openspec/specs/<capability>/ when creating the delta spec at specs/<capability>/spec.md.

      Delta operations (use ## headers):
      - **ADDED Requirements**: New capabilities
      - **MODIFIED Requirements**: Changed behavior - MUST include full updated content
      - **REMOVED Requirements**: Deprecated features - MUST include **Reason** and **Migration**
      - **RENAMED Requirements**: Name changes only - use FROM:/TO: format

      Format requirements:
      - Each requirement: `### Requirement: <name>` followed by description
      - Use SHALL/MUST for normative requirements (avoid should/may)
      - Each scenario: `#### Scenario: <name>` with WHEN/THEN format
      - **CRITICAL**: Scenarios MUST use exactly 4 hashtags (`####`). Using 3 hashtags or bullets will fail silently.
      - Every requirement MUST have at least one scenario.

      Specs should be testable - each scenario is a potential test case.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      **IMPORTANT: Follow the template below exactly.** The apply phase parses
      checkbox format to track progress. Tasks not using `- [ ]` won't be tracked.

      Guidelines:
      - Group related tasks under ## numbered headings
      - Each task MUST be a checkbox: `- [ ] X.Y Task description`
      - Tasks should be small enough to complete in one session
      - Order tasks by dependency (what must be done first?)

      Reference specs for what needs to be built and design.md for
      how to build it (architecture decisions, trade-offs, migration).
    requires:
      - specs
      - design

  - id: plan
    generates: plan.md
    description: Micro-task implementation plan using Superpowers writing-plans
    template: plan.md
    instruction: |
      PRECHECK — required skill availability:
      Before invoking, confirm `writing-plans` appears in
      your available skills list. If missing, STOP and inform the user
      that the required Superpowers skill must be installed (or that they can
      explicitly opt to write plan.md manually using the template
      below). Do NOT silently fall back.

      Use the Skill tool to invoke **writing-plans**.

      IMPORTANT output redirection:
      - Do NOT write to `docs/superpowers/plans/` (or any skill-default
        path). Instead, write
        the plan directly to this change's `plan.md`.

      The writing-plans skill will:
      1. Read the tasks.md and design.md for context
      2. Break each task into 2-5 minute micro-steps (TDD style)
      3. Include exact file paths, code snippets, test commands
      4. Add commit points after each task

      Pass the tasks.md content to the skill as the input for
      decomposition. The plan should reference the specs and
      design artifacts in this change directory.
    requires:
      - tasks
      - design

  - id: verify
    generates: verify.md
    description: Pre-implementation peer review by PM and Architect
    template: verify.md
    instruction: |
      Produce verify.md by gathering peer reviews from two perspectives.

      1. **Collect required documents**:
         Read these 4 files from openspec/changes/<change-name>/:
         - proposal.md (what we're building and why)
         - design.md (technical approach)
         - tasks.md (implementation checklist)
         - plan.md (micro-task breakdown)

      2. **Dispatch parallel reviews**:
         Create TWO review requests using Agent subagents:

         ### PM Review (tasks + plan)
         Launch an agent with description "PM review tasks/plan" and:
         - Prompt: "You are a senior PM reviewing this change.
           Read the tasks.md and plan.md files provided.
           Evaluate:
           1. Are tasks complete and well-scoped?
           2. Does the plan reflect achievable milestones?
           3. Any gaps between proposal goals and execution?
           Provide bullet feedback."
         - Pass tasks.md and plan.md content in the prompt

         ### Architect Review (design + proposal)
         Launch an agent with description "Architect review design/proposal" and:
         - Prompt: "You are a senior architect reviewing this change.
           Read the design.md and proposal.md files provided.
           Evaluate:
           1. Are technical decisions sound and justified?
           2. Does design align with proposal goals?
           3. Any architectural risks or gaps?
           Provide bullet feedback."
         - Pass design.md and proposal.md content in the prompt

      3. **Compile verify.md**:
         Write verify.md following the template structure exactly.
         The template includes:

         - AI review sections (Overall Decision, PM Review, Architect Review)
         - **Human Approval Gate** section (between HUMAN_APPROVAL_GATE:START
           and HUMAN_APPROVAL_GATE:END comments)
           — DO NOT fill in this section yourself. It must remain
           all unchecked. Only the human user can check these boxes.

      4. **Stop and wait for human decision**:
         After writing verify.md, you MUST:
         - Present the full review report to the user
         - Explicitly tell the user they need to check a box in the
           "Human Approval Gate" section
         - **Stop all further actions** and wait for user response
         - NEVER check the approval boxes yourself
         - NEVER proceed to apply before user approval

      Repeat if reviewer recommends revision until both approve.
    requires:
      - plan

  - id: retrospective
    generates: retrospective.md
    description: >
      Post-implementation review recording wins, misses, plan
      deviations, and long-term learning candidates.
      PRECHECK: commit count > 0 and tasks.md has checked items
      (`- [x]`). If PRECHECK fails, STOP and inform user that
      at least one implementation task must be completed first.
    template: retrospective.md
    instruction: |
      PRECHECK — before writing the retrospective, confirm:
      1. `git log` shows at least one new commit (from apply phase)
      2. tasks.md has at least one `- [x]` checked task
      If PRECHECK fails, STOP and tell the user to complete
      implementation first.

      Use the template (`openspec/schemas/superpowers-bridge/templates/retrospective.md`)
      as the structural framework. Fill in each section:

      1. **Evidence (§0)**:
         - Run `git log --oneline <base>..HEAD` for commit chain
         - Run `git diff --stat <base>..HEAD` for diff size
         - Count `- [x]` in tasks.md
         - Capture test coverage signal (if available)

      2. **Wins (§1)**: List successes with evidence citations
         (commit hash, file, test name)

      3. **Misses (§2)**: Classify as 🔴 blocking, 🟡 painful,
         📌 nit. Each with evidence. Write "none" if clean.

      4. **Plan deviations (§3)**: Compare plan.md vs actual
         execution; record tasks that deviated and why

      5. **Skill / workflow compliance (§4)**: Check each
         Superpowers skill required by schema was used.
         Skipped skills MUST be explained in the
         "Deliberately Skipped Skills" subsection with:
         what was skipped, why this cycle, how to prevent

      6. **Surprises (§5)**: Assumptions that turned out wrong

      7. **Promote candidates (§6)**: Use `- [ ]` checkboxes for
         items promotable to memory / CLAUDE.md / schema
    requires:
      - verify

apply:
  requires: [plan, verify]
  tracks: tasks.md
  instruction: |
    **⛔ Human Approval Gate Check (HIGHEST PRIORITY)**:

    Before doing anything else, read verify.md and check the
    checkbox state in the "Human Approval Gate" section
    (between HUMAN_APPROVAL_GATE:START and HUMAN_APPROVAL_GATE:END
    comments):

    - If `✅ Approved — proceed to apply` is checked (`- [x]`)
      → proceed
    - If `⚠️ Conditional approval` is checked → read the user
      notes for conditions, satisfy them before proceeding
    - If `❌ Rejected — revision required` is checked → STOP,
      inform the user they need to revise and re-verify
    - If ALL checkboxes are unchecked → **STOP** and inform the
      user: "verify.md has not received human approval and cannot
      proceed to the apply phase. Please check a box in the
      'Human Approval Gate' section of verify.md."

    Only proceed after explicit human approval.

    ---

    Before implementing, set up an isolated workspace and executor:

    0. **Pre-flight — verify required Superpowers skills**:

       This schema's apply phase requires the following skills.
       Confirm each appears in your available skills list before
       proceeding:

       - using-git-worktrees
       - subagent-driven-development
         (transitively: test-driven-development,
                        requesting-code-review)
       - finishing-a-development-branch

       If any required skill is missing, STOP and inform the user —
       do NOT proceed and do NOT silently fall back to manual
       implementation. The user can install the missing Superpowers skill(s),
       or explicitly opt into the manual fallback path described at
       the end of this instruction.

       Additionally, confirm the project's expected CLI tools are
       on PATH. The exact list depends on the project — read
       plan.md and surface any tool mentioned (e.g., `mvn`/`mvnw`,
       `docker`, `python3`, `jq`, `glab`/`gh`, `node`/`npm`). If
       a tool is missing, surface as WARNING (not STOP) — the user
       may have a fallback. Print the missing list once at apply
       start so the user isn't surprised mid-cycle.

    1. **Workspace**: Use the Skill tool to invoke
       **using-git-worktrees** to create an isolated
       git worktree for this change.

    2. **Executor — subagent-driven-development**:

       Use the Skill tool to invoke
       **subagent-driven-development** to execute
       the plan.md micro-tasks with fresh subagents per task.

       Tell the executor:
       - Read plan.md in this change directory for micro-tasks
       - Update tasks.md checkboxes as coarse tasks complete
       - Work within the created worktree

       IMPORTANT — transitive skill activation:
       subagent-driven-development internally enforces the
       following skills, so you do NOT need to invoke them
       manually:
       - **test-driven-development** — every task
         follows RED-GREEN-REFACTOR. Implementation code written
         before a failing test is deleted.
       - **requesting-code-review** — after each
         task, a code-reviewer subagent is dispatched to catch
         spec compliance and code quality issues. A final review
         runs for the entire implementation before apply
         concludes.

       This schema does NOT support `executing-plans`
       as a fallback for non-subagent platforms. Per its SKILL.md,
       executing-plans does not transitively activate TDD or
       code-review — defeating the rigor that Superpowers brings.
       If your platform lacks subagent support, use the built-in
       `spec-driven` schema instead of this one.

    3. **Verification**: When all tasks are done, produce the
       `verify` artifact by invoking **openspec-verify-change**
       to check completeness, correctness, and coherence.
       Re-run verify until all blocking issues are resolved.

    4. **Retrospective (write while context is hot)**:

       Once verify.md shows no blocking issues, produce the
       `retrospective` artifact using its instruction.
       Template is at
       `openspec/schemas/superpowers-bridge/templates/retrospective.md`.

       Why now, not after PR: retrospective is part of this cycle's
       deliverables and should land in the same PR. Writing it after
       PR merge produces a separate trailing commit and loses the
       hot context (running tests, fresh fix memory).

    5. **Archive (sync spec delta + move folder)**:

       After retrospective.md is written, run `openspec archive -y`
       (or invoke `/opsx:archive`). This:
       - syncs delta specs from `openspec/changes/<name>/specs/`
         into `openspec/specs/<capability>/spec.md`
       - moves the change folder to
         `openspec/changes/archive/YYYY-MM-DD-<name>/`

       The PR diff after archive contains the COMPLETE cycle state:
       all 8 artifacts done, spec synced into main specs, change
       under archive/.

    6. **Completion (PR is the LAST step)**:

       After retrospective + archive are both done, use the Skill
       tool to invoke **finishing-a-development-branch**.

       The branch's PR diff MUST contain the complete archived
       cycle. If it doesn't (e.g., because retrospective or archive
       was skipped), STOP and complete those first.

       This is the canonical opening sequence for the PR — do NOT
       reorder.
